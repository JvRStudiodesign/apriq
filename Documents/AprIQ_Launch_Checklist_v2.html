  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }

  .header p { font-size: 13px; color: var(--text3); }
  .progress-wrap { background: var(--bg2); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; border: 0.5px solid var(--border); }
  .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-count { font-size: 13px; color: var(--text2); }
  .progress-pct { font-size: 20px; font-weight: 500; color: var(--text); }
  .bar-track { background: var(--border); border-radius: 4px; height: 6px; }
  .bar-fill { height: 6px; border-radius: 4px; background: var(--teal); transition: width .3s; }
  .controls { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; }
  .btn:hover { background: var(--bg2); }
  .btn.primary { background: var(--blue-bg); color: var(--blue-text); border-color: transparent; font-weight: 500; }
  .section { background: var(--bg); border: 0.5px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.1rem; cursor: pointer; user-select: none; }
  .section-header:hover { background: var(--bg2); }
  .section-left { display: flex; align-items: center; gap: 10px; }
  .section-num { font-size: 11px; font-weight: 500; color: var(--text3); min-width: 20px; }
  .section-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .section-right { display: flex; align-items: center; gap: 10px; }
  .section-count { font-size: 12px; color: var(--text3); }
  .chevron { font-size: 10px; color: var(--text3); transition: transform .2s; }
  .chevron.open { transform: rotate(180deg); }
  .section-body { border-top: 0.5px solid var(--border); }
  .section-body.collapsed { display: none; }
  .item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 1.1rem; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background .1s; }
  .item:last-child { border-bottom: none; }
  .item:hover { background: var(--bg2); }
  .item.done .item-text { color: var(--text3); text-decoration: line-through; }
  .checkbox { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .checkbox.checked { background: var(--teal); border-color: var(--teal); }
  .checkbox.checked::after { content: ''; display: block; width: 9px; height: 5px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translate(1px, -1px); }
  .item-num { font-size: 11px; color: var(--text3); min-width: 24px; margin-top: 3px; }
  .item-text { font-size: 13px; color: var(--text2); line-height: 1.5; flex: 1; }
  .note-tag { display: inline-block; font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
  .note-done { background: var(--green-bg); color: var(--green-text); }
  .note-pending { background: var(--amber-bg); color: var(--amber-text); }
  .note-na { background: var(--bg3); color: var(--text3); }
  .footer { text-align: center; font-size: 12px; color: var(--text3); margin-top: 2rem; }

const KEY = 'apriq_checklist_v2';

function load() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch { return {}; } }
function save(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch {} }

let state = load();

function getGlobalNum(si, ii) {
  let n = 1;
  for (let s = 0; s < si; s++) n += SECTIONS[s].items.length;
  return n + ii;
}

function render() {
  let total = 0, done = 0;
  let html = '';

  SECTIONS.forEach((section, si) => {
    const sk = 's' + si;
    const collapsed = state[sk + '_c'] === true;
    const sTotal = section.items.length;
    const sDone = section.items.filter((item, ii) => state[sk + '_' + ii] !== undefined ? state[sk + '_' + ii] : item.done).length;
    total += sTotal; done += sDone;

    html += `<div class="section">
      <div class="section-header" onclick="toggleSection('${sk}')">
        <div class="section-left">
          <span class="section-num">${si + 1}.</span>
          <span class="section-name">${section.title}</span>
        </div>
        <div class="section-right">
          <span class="section-count">${sDone}/${sTotal}</span>
          <span class="chevron ${collapsed ? '' : 'open'}">▼</span>
        </div>
      </div>
      <div class="section-body ${collapsed ? 'collapsed' : ''}">`;

    section.items.forEach((item, ii) => {
      const ik = sk + '_' + ii;
      const checked = state[ik] !== undefined ? state[ik] : item.done;
      const num = getGlobalNum(si, ii);
      const tag = item.tag ? `<span class="note-tag note-${item.tag}">${item.tagLabel}</span>` : '';
      html += `<div class="item ${checked ? 'done' : ''}" onclick="toggleItem('${ik}', ${!!item.done})">
        <div class="checkbox ${checked ? 'checked' : ''}"></div>
        <span class="item-num">${num}.</span>
        <span class="item-text">${item.text}${tag}</span>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('checklist').innerHTML = html;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${done} of ${total} complete`;
  document.getElementById('progressPct').textContent = pct + '%';
}

function toggleItem(key, defaultDone) {
  const current = state[key] !== undefined ? state[key] : defaultDone;
  state[key] = !current;
  save(state); render();
}

function toggleSection(key) {
  state[key + '_c'] = !state[key + '_c'];
  save(state); render();
}

function expandAll() {
  SECTIONS.forEach((_, si) => { state['s' + si + '_c'] = false; });
  save(state); render();
}

function collapseAll() {
  SECTIONS.forEach((_, si) => { state['s' + si + '_c'] = true; });
  save(state); render();
}

function resetAll() {
  if (confirm('Reset all checkboxes? Pre-completed items will remain checked.')) {
    const preserved = {};
    SECTIONS.forEach((section, si) => {
      section.items.forEach((item, ii) => {
        if (item.done) preserved['s' + si + '_' + ii] = true;
      });
    });
    state = preserved;
    save(state); render();
  }
}

render();
</script>
</body>
</html>
